name: ct484_project
description: 'A new Flutter project.'

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^16.1.0
  provider: ^6.1.5
  http: ^1.5.0
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  pocketbase: ^0.23.0
  image_picker: ^1.2.0
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Logo1.png
    - assets/Logo2.png
    - .env

flutter_native_splash:
  color: "#ffffff" # Màu nền splash screen
  image: assets/Logo2.png # Đường dẫn logo cho màn hình khởi động
  android: true
